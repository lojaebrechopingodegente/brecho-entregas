<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Clientes - Pingo de Gente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFF5F7 0%, #F0FFF4 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(255, 139, 167, 0.15);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-voltar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-voltar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .header h1 {
            color: #FF6B8A;
            font-size: 1.8rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* Cards de Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            border-top: 4px solid #FF6B8A;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #FF6B8A;
        }

        .stat-label {
            color: #636E72;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Barra de Busca */
        .search-section {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: #2D3436;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #FF8BA7;
        }

        .btn-buscar {
            background: linear-gradient(135deg, #FF8BA7, #FF6B8A);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            height: fit-content;
        }

        .btn-buscar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 138, 0.4);
        }

        .btn-limpar {
            background: #f0f0f0;
            color: #636E72;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-limpar:hover {
            background: #e0e0e0;
        }

        /* Botão Novo Cliente */
        .btn-novo {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-novo:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(78, 205, 196, 0.4);
        }

        /* Lista de Clientes */
        .clientes-list {
            background: white;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .cliente-item {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s;
        }

        .cliente-item:hover {
            background: #FFF5F7;
        }

        .cliente-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .cliente-info {
            flex: 1;
        }

        .cliente-nome {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2D3436;
            margin-bottom: 5px;
        }

        .cliente-dados {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #636E72;
        }

        .cliente-dados span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cliente-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-editar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-excluir {
            background: linear-gradient(135deg, #FF6B6B, #EE5A6F);
            color: white;
        }

        .btn-icon:hover {
            transform: scale(1.1);
        }

        .btn-expand {
            background: #f0f0f0;
            color: #636E72;
            margin-left: 10px;
        }

        /* Detalhes do Cliente (Expandido) */
        .cliente-detalhes {
            display: none;
            padding: 0 25px 25px;
            background: #FAFAFA;
            border-top: 1px solid #f0f0f0;
        }

        .cliente-detalhes.active {
            display: block;
        }

        .secao-enderecos {
            margin-top: 20px;
        }

        .secao-titulo {
            font-size: 1.1rem;
            color: #2D3436;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .endereco-card {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #4ECDC4;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .endereco-info {
            flex: 1;
        }

        .endereco-principal {
            font-weight: 600;
            color: #2D3436;
            margin-bottom: 5px;
        }

        .endereco-complemento {
            font-size: 0.9rem;
            color: #636E72;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-ativo {
            background: #d4edda;
            color: #155724;
        }

        .badge-inativo {
            background: #f8d7da;
            color: #721c24;
        }

        .btn-add-endereco {
            background: white;
            border: 2px dashed #4ECDC4;
            color: #4ECDC4;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-add-endereco:hover {
            background: #4ECDC4;
            color: white;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #FF8BA7, #FF6B8A);
            color: white;
            padding: 25px;
            border-radius: 20px 20px 0 0;
        }

        .modal-header h2 {
            font-size: 1.5rem;
        }

        .modal-body {
            padding: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-grid .form-group.full-width {
            grid-column: 1 / -1;
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancelar {
            background: #f0f0f0;
            color: #636E72;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cancelar:hover {
            background: #e0e0e0;
        }

        .btn-salvar {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-salvar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }

        .btn-salvar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading e Empty State */
        .loading {
            text-align: center;
            padding: 60px;
            color: #636E72;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #636E72;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2D3436;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.show {
            display: flex;
        }

        .toast.success {
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
        }

        .toast.error {
            background: linear-gradient(135deg, #FF6B6B, #EE5A6F);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .search-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .cliente-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .cliente-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <a href="dashboard.html" class="btn-voltar">← Voltar</a>
                <h1>👥 Gerenciamento de Clientes</h1>
            </div>
            <button class="btn-novo" onclick="abrirModalCliente()">
                ➕ Novo Cliente
            </button>
        </div>

        <!-- Estatísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statTotalClientes">-</div>
                <div class="stat-label">Total de Clientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statTotalEnderecos">-</div>
                <div class="stat-label">Total de Endereços</div>

            <div class="stat-card">
                <div class="stat-value" id="statClientesMes">-</div>
                <div class="stat-label">Novos este Mês</div>
            </div>
        </div>

        <!-- Busca -->
        <div class="search-section">
            <div class="search-grid">
                <div class="form-group">
                    <label for="buscaNome">Nome ou CPF</label>
                    <input type="text" id="buscaNome" placeholder="Digite nome ou CPF...">
                </div>
                <div class="form-group">
                    <label for="buscaCidade">Cidade</label>
                    <input type="text" id="buscaCidade" placeholder="Digite a cidade...">
                </div>
                <div class="form-group">
                    <label for="buscaRegiao">Região</label>
                    <select id="buscaRegiao">
                        <option value="">Todas</option>
                        <option value="Norte">Norte</option>
                        <option value="Sul">Sul</option>
                        <option value="Leste">Leste</option>
                        <option value="Oeste">Oeste</option>

                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-buscar" onclick="buscarClientes()">🔍 Buscar</button>
                    <button class="btn-limpar" onclick="limparBusca()">Limpar</button>
                </div>
            </div>
        </div>

        <!-- Lista de Clientes -->
        <div class="clientes-list" id="listaClientes">
            <div class="loading">
                <div>Carregando clientes...</div>
            </div>
        </div>
    </div>

    <!-- Modal Cliente -->
    <div class="modal-overlay" id="modalCliente">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalClienteTitulo">Novo Cliente</h2>
            </div>
            <div class="modal-body">
                <form id="formCliente" class="form-grid">
                    <input type="hidden" id="clienteId">
                    <div class="form-group">
                        <label for="nome">Nome *</label>
                        <input type="text" id="nome" required maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp</label>
                        <input type="text" id="whatsapp" maxlength="20" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="instagram">Instagram</label>
                        <input type="text" id="instagram" maxlength="50" placeholder="@usuario">
                    </div>
                    <div class="form-group full-width">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" maxlength="255">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancelar" onclick="fecharModalCliente()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarCliente()">Salvar Cliente</button>
            </div>
        </div>
    </div>

    <!-- Modal Endereço -->
    <div class="modal-overlay" id="modalEndereco">
        <div class="modal">
            <div class="modal-header" style="background: linear-gradient(135deg, #4ECDC4, #44A08D);">
                <h2 id="modalEnderecoTitulo">Novo Endereço</h2>
            </div>
            <div class="modal-body">
                <form id="formEndereco" class="form-grid">
                    <input type="hidden" id="enderecoId">
                    <input type="hidden" id="enderecoClienteId">
                    <div class="form-group">
                        <label for="cep">CEP *</label>
                        <input type="text" id="cep" required maxlength="9" placeholder="00000-000">
                    </div>
                    <div class="form-group">
                        <label for="rua">Rua *</label>
                        <input type="text" id="rua" required maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" maxlength="100" placeholder="Apto, Bloco, etc">
                    </div>
                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="cidade">Cidade *</label>
                        <input type="text" id="cidade" required maxlength="50">
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" maxlength="2" value="SC">
                    </div>
                    <div class="form-group">
                        <label for="regiao">Região</label>
                        <select id="regiao">
                            <option value="">Selecione...</option>
                            <option value="Norte">Norte</option>
                            <option value="Sul">Sul</option>
                            <option value="Leste">Leste</option>

                <button class="btn-cancelar" onclick="fecharModalEndereco()">Cancelar</button>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================
        // CONFIGURAÇÃO SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://ytnfjzngalfapfnbobfm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0bmZqem5nYWxmYXBmbmJvYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDk4MjksImV4cCI6MjA4OTA4NTgyOX0.1-qPr2JIFzN5bL2F7GbcLN1Pm0rAQaP6-PQ9fxLkdls';

        let supabaseClient = null;
        let clientesData = [];
        let enderecosData = [];

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            verificarAutenticacao();
            inicializarSupabase();
        });

        function verificarAutenticacao() {
            const STORAGE_SENHA = 'pingo_senha_hash';
            const SENHA_CORRETA = '770057';

            function criarHash(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return hash.toString(16);
            }

            const senhaSalva = localStorage.getItem(STORAGE_SENHA);
            const temAcesso = senhaSalva && criarHash(SENHA_CORRETA) === senhaSalva;

            if (!temAcesso) {
                window.location.replace('login.html');
            }
        }

        function inicializarSupabase() {
            try {
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    carregarDados();
                }
            } catch (e) {
                console.error('Erro ao conectar Supabase:', e);
                mostrarToast('Erro ao conectar com o banco de dados', 'error');
            }
        }

        // ============================================
        // CARREGAMENTO DE DADOS
        // ============================================
        async function carregarDados() {
            await Promise.all([
                carregarEstatisticas(),
                buscarClientes()
            ]);
        }

        async function carregarEstatisticas() {
            if (!supabaseClient) return;

            try {
                // Total de clientes
                const { count: totalClientes } = await supabaseClient
                    .from('clientes_pg')
                    .select('*', { count: 'exact', head: true });

                // Total de endereços
                const { count: totalEnderecos } = await supabaseClient
                    .from('enderecos_pg')
                    .select('*', { count: 'exact', head: true });

                // Clientes do mês atual
                const inicioMes = new Date();
                inicioMes.setDate(1);
                inicioMes.setHours(0, 0, 0, 0);

                const { count: clientesMes } = await supabaseClient
                    .from('clientes_pg')
                    .select('*', { count: 'exact', head: true })
                    .gte('criado_em', inicioMes.toISOString());

                document.getElementById('statTotalClientes').textContent = totalClientes || 0;
                document.getElementById('statTotalEnderecos').textContent = totalEnderecos || 0;
                document.getElementById('statClientesMes').textContent = clientesMes || 0;

            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
            }
        }

        async function buscarClientes() {
            if (!supabaseClient) return;

            const nome = document.getElementById('buscaNome').value.trim();
            const cidade = document.getElementById('buscaCidade').value.trim();
            const regiao = document.getElementById('buscaRegiao').value;

            try {
                let query = supabaseClient
                    .from('clientes_pg')
                    .select(`
                        *,
                        enderecos_pg (*)
                    `)
                    .order('nome');

                // Filtro por nome ou CPF
                if (nome) {
                    const cpfLimpo = nome.replace(/\\D/g, '');
                    if (cpfLimpo.length > 0) {
                        query = query.or(`nome.ilike.%${nome}%,cpf.ilike.%${nome}%`);
                    } else {
                        query = query.ilike('nome', `%${nome}%`);
                    }
                }

                const { data: clientes, error } = await query;

                if (error) throw error;

                // Filtrar por cidade/região no JavaScript (já que são dados relacionados)
                let clientesFiltrados = clientes || [];

                if (cidade || regiao) {
                    clientesFiltrados = clientesFiltrados.filter(cliente => {
                        const enderecos = cliente.enderecos_pg || [];
                        return enderecos.some(end => {
                            const matchCidade = !cidade || (end.cidade && end.cidade.toLowerCase().includes(cidade.toLowerCase()));
                            const matchRegiao = !regiao || end.regiao === regiao;
                            return matchCidade && matchRegiao;
                        });
                    });
                }

                clientesData = clientesFiltrados;
                renderizarClientes(clientesFiltrados);

            } catch (error) {
                console.error('Erro ao buscar clientes:', error);
                mostrarToast('Erro ao buscar clientes', 'error');
            }
        }

        function renderizarClientes(clientes) {
            const container = document.getElementById('listaClientes');

            if (clientes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <h3>Nenhum cliente encontrado</h3>
                        <p>Tente ajustar os filtros de busca ou cadastre um novo cliente.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = clientes.map(cliente => {
                const enderecos = cliente.enderecos_pg || [];
                const enderecoPrincipal = enderecos.find(e => e.ativo) || enderecos[0];

                return `
                    <div class="cliente-item" data-id="${cliente.id}">
                        <div class="cliente-header" onclick="toggleDetalhes('${cliente.id}')">
                            <div class="cliente-info">
                                <div class="cliente-nome">${escapeHtml(cliente.nome)}</div>
                                <div class="cliente-dados">
                                    <span>🆔 ${formatarCPF(cliente.cpf)}</span>
                                    ${cliente.whatsapp ? `<span>📱 ${escapeHtml(cliente.whatsapp)}</span>` : ''}
                                    ${enderecoPrincipal ? `<span>📍 ${escapeHtml(enderecoPrincipal.cidade)}/${escapeHtml(enderecoPrincipal.estado)}</span>` : ''}
                                    <span>🏠 ${enderecos.length} endereço(s)</span>
                                </div>
                            </div>
                            <div class="cliente-actions" onclick="event.stopPropagation()">
                                <button class="btn-icon btn-editar" onclick="editarCliente('${cliente.id}')" title="Editar">✏️</button>
                                <button class="btn-icon btn-excluir" onclick="excluirCliente('${cliente.id}')" title="Excluir">🗑️</button>
                                <button class="btn-icon btn-expand" title="Ver detalhes">▼</button>
                            </div>
                        </div>
                        <div class="cliente-detalhes" id="detalhes-${cliente.id}">
                            <div class="secao-enderecos">
                                <h3 class="secao-titulo">📍 Endereços</h3>
                                ${enderecos.length === 0 ? '<p style="color: #636E72;">Nenhum endereço cadastrado</p>' : ''}
                                ${enderecos.map(end => `
                                    <div class="endereco-card">
                                        <div class="endereco-info">
                                            <div class="endereco-principal">
                                                ${escapeHtml(end.rua)}, ${escapeHtml(end.numero || 'S/N')}
                                                ${end.ativo ? '<span class="badge badge-ativo">Ativo</span>' : '<span class="badge badge-inativo">Inativo</span>'}
                                            </div>
                                            <div class="endereco-complemento">
                                                ${end.complemento ? escapeHtml(end.complemento) + ' - ' : ''}
                                                ${escapeHtml(end.bairro || '')} - ${escapeHtml(end.cidade)}/${escapeHtml(end.estado)}
                                                ${end.cep ? `- CEP: ${escapeHtml(end.cep)}` : ''}
                                                ${end.regiao ? `<span style="color: #FF6B8A; font-weight: 600;">[${escapeHtml(end.regiao)}]</span>` : ''}
                                            </div>
                                        </div>
                                        <div style="display: flex; gap: 8px;">
                                            <button class="btn-icon btn-editar" onclick="editarEndereco('${end.id}')" title="Editar">✏️</button>
                                            <button class="btn-icon btn-excluir" onclick="excluirEndereco('${end.id}')" title="Excluir">🗑️</button>
                                        </div>
                                    </div>
                                `).join('')}
                                <button class="btn-add-endereco" onclick="abrirModalEndereco('${cliente.id}')">
                                    ➕ Adicionar Endereço
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleDetalhes(clienteId) {
            const detalhes = document.getElementById(`detalhes-${clienteId}`);
            const item = document.querySelector(`[data-id="${clienteId}"]`);
            const btnExpand = item.querySelector('.btn-expand');

            detalhes.classList.toggle('active');
            btnExpand.textContent = detalhes.classList.contains('active') ? '▲' : '▼';
        }

        // ============================================
        // MODAL CLIENTE
        // ============================================
        function abrirModalCliente(clienteId = null) {
            const modal = document.getElementById('modalCliente');
            const titulo = document.getElementById('modalClienteTitulo');
            const form = document.getElementById('formCliente');

            form.reset();
            document.getElementById('clienteId').value = '';

            if (clienteId) {
                const cliente = clientesData.find(c => c.id === clienteId);
                if (cliente) {
                    titulo.textContent = 'Editar Cliente';
                    document.getElementById('clienteId').value = cliente.id;
                    document.getElementById('nome').value = cliente.nome || '';
                    document.getElementById('cpf').value = cliente.cpf || '';
                    document.getElementById('whatsapp').value = cliente.whatsapp || '';
                    document.getElementById('instagram').value = cliente.instagram || '';
                    document.getElementById('email').value = cliente.email || '';
                }
            } else {
                titulo.textContent = 'Novo Cliente';
            }

            modal.classList.add('active');
        }

        function fecharModalCliente() {
            document.getElementById('modalCliente').classList.remove('active');
        }

        async function salvarCliente() {
            const id = document.getElementById('clienteId').value;
            const dados = {
                nome: document.getElementById('nome').value.trim(),
                cpf: document.getElementById('cpf').value.trim() || null,
                whatsapp: document.getElementById('whatsapp').value.trim() || null,
                instagram: document.getElementById('instagram').value.trim() || null,
                email: document.getElementById('email').value.trim() || null
            };

            if (!dados.nome) {
                mostrarToast('Nome é obrigatório', 'error');
                return;
            }

            try {
                let result;
                if (id) {
                    result = await supabaseClient
                        .from('clientes_pg')
                        .update(dados)
                        .eq('id', id)
                        .select();
                } else {
                    result = await supabaseClient
                        .from('clientes_pg')
                        .insert([dados])
                        .select();
                }

                if (result.error) {
                    if (result.error.code === '23505') {
                        mostrarToast('CPF já cadastrado', 'error');
                        return;
                    }
                    throw result.error;
                }

                mostrarToast(id ? 'Cliente atualizado com sucesso!' : 'Cliente cadastrado com sucesso!', 'success');
                fecharModalCliente();
                await buscarClientes();
                await carregarEstatisticas();

            } catch (error) {
                console.error('Erro ao salvar cliente:', error);
                mostrarToast('Erro ao salvar cliente', 'error');
            }
        }

        function editarCliente(id) {
            abrirModalCliente(id);
        }

        async function excluirCliente(id) {
            if (!confirm('Tem certeza que deseja excluir este cliente? Todos os endereços associados também serão excluídos.')) {
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('clientes_pg')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                mostrarToast('Cliente excluído com sucesso!', 'success');
                await buscarClientes();
                await carregarEstatisticas();

            } catch (error) {
                console.error('Erro ao excluir cliente:', error);
                mostrarToast('Erro ao excluir cliente', 'error');
            }
        }

        // ============================================
        // MODAL ENDEREÇO
        // ============================================
        function abrirModalEndereco(clienteId, enderecoId = null) {
            const modal = document.getElementById('modalEndereco');
            const titulo = document.getElementById('modalEnderecoTitulo');
            const form = document.getElementById('formEndereco');

            form.reset();
            document.getElementById('enderecoId').value = '';
            document.getElementById('enderecoClienteId').value = clienteId;

            if (enderecoId) {
                // Buscar endereço nos dados já carregados
                let endereco = null;
                clientesData.forEach(c => {
                    const end = c.enderecos_pg?.find(e => e.id === enderecoId);
                    if (end) endereco = end;
                });

                if (endereco) {
                    titulo.textContent = 'Editar Endereço';
                    document.getElementById('enderecoId').value = endereco.id;
                    document.getElementById('enderecoClienteId').value = endereco.cliente_id;
                    document.getElementById('cep').value = endereco.cep || '';
                    document.getElementById('rua').value = endereco.rua || '';
                    document.getElementById('numero').value = endereco.numero || '';
                    document.getElementById('complemento').value = endereco.complemento || '';
                    document.getElementById('bairro').value = endereco.bairro || '';
                    document.getElementById('cidade').value = endereco.cidade || '';
                    document.getElementById('estado').value = endereco.estado || 'SC';
                    document.getElementById('regiao').value = endereco.regiao || '';
                }
            } else {
                titulo.textContent = 'Novo Endereço';
            }

            modal.classList.add('active');
        }

        function fecharModalEndereco() {
            document.getElementById('modalEndereco').classList.remove('active');
        }

        async function salvarEndereco() {
            const id = document.getElementById('enderecoId').value;
            const clienteId = document.getElementById('enderecoClienteId').value;
            
            const dados = {
                cliente_id: clienteId,
                cep: document.getElementById('cep').value.trim(),
                rua: document.getElementById('rua').value.trim(),
                numero: document.getElementById('numero').value.trim() || null,
                complemento: document.getElementById('complemento').value.trim() || null,
                bairro: document.getElementById('bairro').value.trim() || null,
                cidade: document.getElementById('cidade').value.trim(),
                estado: document.getElementById('estado').value.trim() || 'SC',
                regiao: document.getElementById('regiao').value || null
            };

            if (!dados.cep || !dados.rua || !dados.cidade) {
                mostrarToast('CEP, Rua e Cidade são obrigatórios', 'error');
                return;
            }

            try {
                let result;
                if (id) {
                    result = await supabaseClient
                        .from('enderecos_pg')
                        .update(dados)
                        .eq('id', id)
                        .select();
                } else {
                    result = await supabaseClient
                        .from('enderecos_pg')
                        .insert([dados])
                        .select();
                }

                if (result.error) throw result.error;

                mostrarToast(id ? 'Endereço atualizado com sucesso!' : 'Endereço cadastrado com sucesso!', 'success');
                fecharModalEndereco();
                await buscarClientes();

            } catch (error) {
                console.error('Erro ao salvar endereço:', error);
                mostrarToast('Erro ao salvar endereço', 'error');
            }
        }

        function editarEndereco(id) {
            const clienteId = document.getElementById(`detalhes-${getClienteIdByEndereco(id)}`)?.closest('.cliente-item')?.dataset.id;
            abrirModalEndereco(clienteId, id);
        }

        function getClienteIdByEndereco(enderecoId) {
            for (const cliente of clientesData) {
                if (cliente.enderecos_pg?.some(e => e.id === enderecoId)) {
                    return cliente.id;
                }
            }
            return null;
        }

        async function excluirEndereco(id) {
            if (!confirm('Tem certeza que deseja excluir este endereço?')) {
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('enderecos_pg')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                mostrarToast('Endereço excluído com sucesso!', 'success');
                await buscarClientes();

            } catch (error) {
                console.error('Erro ao excluir endereço:', error);
                mostrarToast('Erro ao excluir endereço', 'error');
            }
        }

        // ============================================
        // UTILITÁRIOS
        // ============================================
        function limparBusca() {
            document.getElementById('buscaNome').value = '';
            document.getElementById('buscaCidade').value = '';
            document.getElementById('buscaRegiao').value = '';
            buscarClientes();
        }

        function formatarCPF(cpf) {
            if (!cpf) return 'Não informado';
            const cpfLimpo = cpf.replace(/\\D/g, '');
            if (cpfLimpo.length !== 11) return cpf;
            return cpfLimpo.replace(/(\\d{3})(\\d{3})(\\d{3})(\\d{2})/, '$1.$2.$3-$4');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function mostrarToast(mensagem, tipo = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = mensagem;
            toast.className = `toast ${tipo} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Fechar modais ao clicar fora
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // Máscara de CPF
        document.getElementById('cpf').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\\D/g, '');
            if (value.length <= 11) {
                value = value.replace(/(\\d{3})(\\d)/, '$1.$2');
                value = value.replace(/(\\d{3})(\\d)/, '$1.$2');
                value = value.replace(/(\\d{3})(\\d{1,2})$/, '$1-$2');
            }
            e.target.value = value;
        });

        // Máscara de CEP
        document.getElementById('cep').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\\D/g, '');
            if (value.length <= 8) {
                value = value.replace(/(\\d{5})(\\d)/, '$1-$2');
            }
            e.target.value = value;
        });
    </script>
</body>
</html>
