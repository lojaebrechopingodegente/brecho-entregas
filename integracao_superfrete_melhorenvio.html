<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperFrete + Supabase - Loja Pingo de Gente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Botão Voltar */
        .btn-voltar {
            background: linear-gradient(135deg, #A8E6CF, #7FCDCD);
            color: #2D3436;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-voltar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 230, 207, 0.4);
        }

        h1 { text-align: center; color: #1a1a2e; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }

        .section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea { min-height: 150px; font-family: monospace; font-size: 13px; }

        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-success { background: #28a745; }
        .btn-warning { background: #ffc107; color: #212529; }
        .btn-info { background: #17a2b8; }
        .btn-orange { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }

        .comando-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 13px;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .alert-info { background: #e7f3ff; border: 1px solid #b3d9ff; color: #004085; }
        .alert-warning { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; }

        .etiqueta-card {
            background: white;
            border: 2px solid #e8e8e8;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .etiqueta-card.salvo { border-color: #28a745; background: #f8fff8; }

        .etiqueta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .etiqueta-id {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            font-family: monospace;
        }

        .status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-delivered { background: #d4edda; color: #155724; }
        .status-released { background: #cce5ff; color: #004085; }
        .status-canceled { background: #f8d7da; color: #721c24; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
        }

        .info-item label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-item p {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .valor { color: #28a745; font-size: 16px !important; }

        .rastreio {
            font-family: monospace;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .vincular-section {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .vincular-row {
            display: grid;
            grid-template-columns: 2fr 1fr auto;
            gap: 10px;
            align-items: end;
        }

        .hidden { display: none !important; }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .filtro-box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #e8e8e8;
        }

        .filtro-box label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
        }

        .info-filtro {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        .rastreamento-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            margin-top: 8px;
            padding: 6px 12px;
            background: #f0f4ff;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .rastreamento-link:hover {
            background: #667eea;
            color: white;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .vincular-row {
                grid-template-columns: 1fr;
            }
            
            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>

</head>
<body>
    <div class="container">
        <!-- Botão Voltar -->
        <a href="rastreamento.html" class="btn-voltar">← Voltar para Rastreamento</a>

        <h1>🏷️ SuperFrete + Supabase</h1>
        <p class="subtitle">Loja Pingo de Gente - Integração Produção</p>

        <!-- SEÇÃO SUPERFRETE -->
        <div class="section" id="secaoSuperfrete">
            <div class="section-title">📦 Consulta SuperFrete (Produção)</div>

            <div class="form-group">
                <label>Token SuperFrete:</label>
                <input type="password" id="tokenSuperfrete" placeholder="Cole seu token de produção aqui...">
            </div>

            <div class="alert alert-info">
                <strong>💡 Dica:</strong> Execute o comando no PowerShell. O resultado será copiado automaticamente!
            </div>

            <div class="comando-box">
                <button class="copy-btn" onclick="copiarComando()">📋 Copiar</button>
                <div id="comandoTexto" style="white-space:pre-wrap;word-break:break-all;"></div>
            </div>

            <div class="form-group">
                <label>Cole aqui o resultado JSON:</label>
                <textarea id="jsonResultado" placeholder='{"data":[...]}'></textarea>
            </div>

            <button onclick="processarEtiquetas()" id="btnProcessar">
                📊 Processar Etiquetas
            </button>
        </div>

        <!-- RESULTADOS -->
        <div id="secaoResultados" class="hidden">
            <div class="section">
                <div class="section-title">📋 Etiquetas Encontradas</div>

                <!-- FILTRO DE PESQUISA -->
                <div class="filtro-box">
                    <label>🔍 Pesquisar solicitação por nome:</label>
                    <input type="text" id="filtroNome" placeholder="Digite o nome do cliente..." oninput="filtrarSolicitacoes()">
                    <div class="info-filtro">
                        Mostrando <span id="contadorSolicitacoes">0</span> solicitações sem rastreamento
                    </div>
                </div>

                <div class="stats-bar" id="statsBar"></div>
                <div id="listaEtiquetas"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // PROTEÇÃO DE ACESSO
        // ============================================
        (function() {
            const STORAGE_SENHA = 'pingo_senha_hash';
            const SENHA_CORRETA = '770057';

            function criarHash(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return hash.toString(16);
            }

            const senhaSalva = localStorage.getItem(STORAGE_SENHA);
            const temAcesso = senhaSalva && criarHash(SENHA_CORRETA) === senhaSalva;

            if (!temAcesso) {
                window.location.replace('login.html');
                throw new Error('Acesso não autorizado');
            }
        })();

        // ============================================
        // SUPABASE CONFIGURAÇÃO
        // ============================================
        const SUPABASE_URL = 'https://ytnfjzngalfapfnbobfm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0bmZqem5nYWxmYXBmbmJvYmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDk4MjksImV4cCI6MjA4OTA4NTgyOX0.1-qPr2JIFzN5bL2F7GbcLN1Pm0rAQaP6-PQ9fxLkdls';

        let supabaseClient = null;
        let etiquetasData = [];
        let solicitacoesCache = [];
        let rastreamentosExistentes = [];

        const CONFIG = {
            producao: { 
                url: 'https://api.superfrete.com/api/v0/me/orders?page=1&limit=50', 
                campoDados: 'data'
            }
        };

        // Inicializar Supabase automaticamente
        async function inicializarSupabase() {
            try {
                if (typeof supabase !== 'undefined') {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    
                    // Buscar solicitações
                    const { data: solicitacoes, error: errorSol } = await supabaseClient
                        .from('solicitacoes_pg')
                        .select('id, numero_solicitacao, codigo_rastreio, clientes_pg(nome, email)')
                        .order('data_solicitacao', { ascending: false })
                        .limit(200);

                    if (errorSol) throw errorSol;

                    // Buscar rastreamentos existentes
                    const { data: rastreamentos, error: errorRast } = await supabaseClient
                        .from('rastreamentos_pg')
                        .select('codigo_rastreio, solicitacao_id');

                    if (errorRast) throw errorRast;

                    rastreamentosExistentes = rastreamentos.map(r => r.codigo_rastreio);

                    // Filtrar apenas solicitações SEM rastreamento
                    solicitacoesCache = solicitacoes.filter(s => {
                        const semCodigoNaTabela = !s.codigo_rastreio;
                        const semRastreamentoCadastrado = !rastreamentos.some(r => r.solicitacao_id === s.id);
                        return semCodigoNaTabela && semRastreamentoCadastrado;
                    });

                    // Mostrar mensagem de sucesso
                    const secao = document.getElementById('secaoSuperfrete');
                    const statusDiv = document.createElement('div');
                    statusDiv.id = 'supabaseStatus';
                    statusDiv.innerHTML = `
                        <div class="alert alert-success" style="margin-top: 15px;">
                            ✅ Conectado ao Supabase!<br>
                            • ${solicitacoesCache.length} solicitações sem rastreamento<br>
                            • ${rastreamentos.length} rastreamentos já cadastrados (filtrados)
                        </div>
                    `;
                    secao.appendChild(statusDiv);

                    atualizarContador();

                }
            } catch (err) {
                console.error('Erro ao conectar Supabase:', err);
                const secao = document.getElementById('secaoSuperfrete');
                const statusDiv = document.createElement('div');
                statusDiv.id = 'supabaseStatus';
                statusDiv.innerHTML = `<div class="alert alert-error" style="margin-top: 15px;">❌ Erro: ${err.message}</div>`;
                secao.appendChild(statusDiv);
            }
        }

        // Atualizar comando PowerShell
        function atualizarComando() {
            const token = document.getElementById('tokenSuperfrete').value.trim() || 'SEU_TOKEN_AQUI';
            const url = CONFIG.producao.url;

            const comando = `Invoke-RestMethod -Uri "${url}" -Method GET -Headers @{"Authorization"="Bearer ${token}"; "Accept"="application/json"; "User-Agent"="Loja Pingo de Gente (marcobet@gmail.com)"} | ConvertTo-Json -Depth 10 | Set-Clipboard`;

            document.getElementById('comandoTexto').textContent = comando;
        }

        // Copiar comando
        function copiarComando() {
            const texto = document.getElementById('comandoTexto').textContent;
            navigator.clipboard.writeText(texto).then(() => {
                const btn = event.target;
                btn.textContent = '✅ Copiado!';
                setTimeout(() => btn.textContent = '📋 Copiar', 2000);
            });
        }

        // Processar etiquetas do JSON
        async function processarEtiquetas() {
            const jsonText = document.getElementById('jsonResultado').value.trim();

            if (!jsonText) {
                alert('Cole o JSON primeiro!');
                return;
            }

            try {
                const data = JSON.parse(jsonText);
                const campo = CONFIG.producao.campoDados;
                etiquetasData = data[campo] || data.data || [];

                if (!Array.isArray(etiquetasData) || etiquetasData.length === 0) {
                    alert('Nenhuma etiqueta encontrada no JSON!');
                    return;
                }

                // Filtrar etiquetas que já têm rastreamento cadastrado
                etiquetasData = etiquetasData.filter(etq => {
                    const rastreio = etq.tracking || etq.tracking_code || etq.code || '';
                    return !rastreamentosExistentes.includes(rastreio);
                });

                if (etiquetasData.length === 0) {
                    alert('Todas as etiquetas já estão cadastradas no sistema!');
                    return;
                }

                renderizarEtiquetas(etiquetasData);
                atualizarContador();

            } catch (err) {
                alert('Erro ao processar JSON: ' + err.message);
            }
        }

        // Filtrar solicitações por nome
        function filtrarSolicitacoes() {
            const filtro = document.getElementById('filtroNome').value.toLowerCase();
            const selects = document.querySelectorAll('select[id^="solicitacao-"]');

            selects.forEach(select => {
                const options = select.querySelectorAll('option');
                let temVisivel = false;

                options.forEach(opt => {
                    if (opt.value === '') return;

                    const texto = opt.textContent.toLowerCase();
                    if (texto.includes(filtro)) {
                        opt.style.display = '';
                        temVisivel = true;
                    } else {
                        opt.style.display = 'none';
                    }
                });

                if (!temVisivel && filtro !== '') {
                    let optNenhuma = select.querySelector('option[data-temp="true"]');
                    if (!optNenhuma) {
                        optNenhuma = document.createElement('option');
                        optNenhuma.setAttribute('data-temp', 'true');
                        optNenhuma.disabled = true;
                        select.appendChild(optNenhuma);
                    }
                    optNenhuma.textContent = 'Nenhuma solicitação encontrada';
                    optNenhuma.style.display = '';
                }
            });

            atualizarContador();
        }

        // Atualizar contador de solicitações visíveis
        function atualizarContador() {
            const filtro = document.getElementById('filtroNome').value.toLowerCase();
            let total = 0;

            solicitacoesCache.forEach(s => {
                const nome = (s.clientes_pg?.nome || '').toLowerCase();
                if (nome.includes(filtro) || filtro === '') {
                    total++;
                }
            });

            document.getElementById('contadorSolicitacoes').textContent = total;
        }

        // Renderizar etiquetas
        function renderizarEtiquetas(etiquetas) {
            const container = document.getElementById('secaoResultados');
            const lista = document.getElementById('listaEtiquetas');
            const stats = document.getElementById('statsBar');

            container.classList.remove('hidden');

            const comRastreio = etiquetas.filter(e => {
                const rastreio = e.tracking || e.tracking_code || e.code;
                return rastreio && rastreio !== 'N/A';
            }).length;

            stats.innerHTML = `
                <div class="stat-item">
                    <div class="stat-number">${etiquetas.length}</div>
                    <div class="stat-label">Etiquetas Novas</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" style="color:#28a745;">${comRastreio}</div>
                    <div class="stat-label">Com Rastreio</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" style="color:#dc3545;">${rastreamentosExistentes.length}</div>
                    <div class="stat-label">Já Cadastrados</div>
                </div>
            `;

            const opcoesSolicitacoes = solicitacoesCache.map(s => {
                const nome = s.clientes_pg?.nome || 'Sem nome';
                const email = s.clientes_pg?.email || '';
                const num = s.numero_solicitacao || s.id.substring(0, 8);
                return `<option value="${s.id}">#${num} - ${nome} ${email ? '(' + email + ')' : ''}</option>`;
            }).join('');

            lista.innerHTML = etiquetas.map((etq, index) => {
                const id = etq.order_id || etq.id || 'N/A';
                const rastreio = etq.tracking || etq.tracking_code || etq.code || '';
                const destinatario = etq.to?.name || 'N/A';
                const cidade = etq.to?.city || 'N/A';
                const estado = etq.to?.state || etq.to?.state_abbr || 'N/A';
                const transportadora = etq.carrier || 'correios';

                let valor = 0;
                if (typeof etq.price === 'object') {
                    valor = etq.price?.total || 0;
                } else {
                    valor = etq.price || 0;
                }

                const status = (etq.status || 'unknown').toLowerCase();

                let linkRastreamento = '';
                if (rastreio) {
                    if (transportadora.toLowerCase().includes('correios')) {
                        linkRastreamento = `https://rastreamento.correios.com.br/app/index.php?objeto=${rastreio}`;
                    } else if (transportadora.toLowerCase().includes('jadlog')) {
                        linkRastreamento = `https://www.jadlog.com.br/tracking?objeto=${rastreio}`;
                    } else {
                        linkRastreamento = `https://rastreamentomelhorenvio.com.br/${rastreio}`;
                    }
                }

                return `
                    <div class="etiqueta-card" id="etiqueta-${index}">
                        <div class="etiqueta-header">
                            <div>
                                <div class="etiqueta-id">#${id}</div>
                                <div style="font-size:12px;color:#666;">${destinatario} - ${cidade}/${estado}</div>
                            </div>
                            <span class="status status-${status}">${status.toUpperCase()}</span>
                        </div>

                        <div class="info-grid">
                            <div class="info-item">
                                <label>Rastreio</label>
                                <p>${rastreio ? `<span class="rastreio">${rastreio}</span>` : 'N/A'}</p>
                                ${rastreio ? `<a href="${linkRastreamento}" target="_blank" class="rastreamento-link">🔍 Rastrear →</a>` : ''}
                            </div>
                            <div class="info-item">
                                <label>Transportadora</label>
                                <p>${transportadora}</p>
                            </div>
                            <div class="info-item">
                                <label>Valor</label>
                                <p class="valor">R$ ${parseFloat(valor).toFixed(2)}</p>
                            </div>
                            <div class="info-item">
                                <label>Criado em</label>
                                <p>${new Date(etq.created_at).toLocaleString('pt-BR')}</p>
                            </div>
                        </div>

                        ${rastreio ? `
                        <div class="vincular-section">
                            <label>Vincular à Solicitação:</label>
                            <div class="vincular-row">
                                <select id="solicitacao-${index}">
                                    <option value="">Selecione...</option>
                                    ${opcoesSolicitacoes}
                                </select>
                                <input type="date" id="data-envio-${index}">
                                <button class="btn-success" onclick="salvarRastreamento(${index}, '${rastreio}', '${transportadora}')">
                                    Salvar
                                </button>
                            </div>
                            <div id="msg-${index}" style="margin-top:10px;"></div>
                        </div>
                        ` : '<div style="margin-top:15px;color:#856404;">⚠️ Sem código de rastreio</div>'}
                    </div>
                `;
            }).join('');
        }

        // Salvar rastreamento
        async function salvarRastreamento(index, codigoRastreio, formaEnvio) {
            const solicitacaoId = document.getElementById(`solicitacao-${index}`).value;
            const dataEnvio = document.getElementById(`data-envio-${index}`).value;
            const msgDiv = document.getElementById(`msg-${index}`);
            const btn = event.target;

            if (!solicitacaoId) {
                msgDiv.innerHTML = '<span style="color:#dc3545;">Selecione uma solicitação!</span>';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Salvando...';

            try {
                const { error } = await supabaseClient
                    .from('rastreamentos_pg')
                    .insert({
                        solicitacao_id: solicitacaoId,
                        codigo_rastreio: codigoRastreio,
                        forma_envio: formaEnvio.toLowerCase(),
                        data_envio: dataEnvio || null,
                        observacoes: `Importado do SuperFrete (producao)`
                    });

                if (error) throw error;

                await supabaseClient
                    .from('solicitacoes_pg')
                    .update({
                        codigo_rastreio: codigoRastreio,
                        forma_envio: formaEnvio.toLowerCase(),
                        data_envio: dataEnvio || null,
                        status: 'enviado',
                        atualizado_em: new Date().toISOString()
                    })
                    .eq('id', solicitacaoId);

                rastreamentosExistentes.push(codigoRastreio);
                solicitacoesCache = solicitacoesCache.filter(s => s.id !== solicitacaoId);

                document.getElementById(`etiqueta-${index}`).classList.add('salvo');
                msgDiv.innerHTML = '<div class="alert alert-success" style="margin:0;padding:10px;">✅ Salvo! Removido da lista.</div>';

                atualizarContador();

            } catch (err) {
                let msg = err.message;
                if (err.code === '23505') msg = 'Rastreio já cadastrado!';
                msgDiv.innerHTML = `<div class="alert alert-error" style="margin:0;padding:10px;">❌ ${msg}</div>`;
                btn.disabled = false;
                btn.textContent = 'Salvar';
            }
        }

        // Inicializar
        document.getElementById('tokenSuperfrete').addEventListener('input', atualizarComando);
        document.addEventListener('DOMContentLoaded', () => {
            atualizarComando();
            inicializarSupabase();
        });
    </script>
</body>
</html>
